<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | RecyTech</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="/"><img src="/assets/logo.svg" alt="RecyTech"></a>
      <nav class="nav-links">
        <a href="/marketplace.html">Marketplace</a>
        <a href="/sell.html">Sell E-Waste</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/about.html">About</a>
      </nav>
      <div class="nav-actions" data-nav-actions></div>
    </div>
  </header>
  <main>
    <section class="page-hero">
      <div class="container page-title">
        <h1 data-user-name>Dashboard</h1>
        <p data-user-meta></p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <div data-dashboard-alert></div>
        <div class="metric-grid" data-stats></div>
        <div class="section-head" style="margin-top:36px">
          <div><h2>Your Listings</h2><p>Track your e-waste products and their approval status.</p></div>
          <a class="btn green" href="/sell.html">Add listing</a>
        </div>
        <div class="grid-3" data-my-listings></div>
        <div class="section-head" style="margin-top:36px">
          <div><h2>Inquiries</h2><p>Messages and offers connected to your buying or selling activity.</p></div>
        </div>
        <div class="panel table-wrap">
          <table>
            <thead><tr><th>Listing</th><th>Buyer</th><th>Offer</th><th>Message</th><th>Status</th></tr></thead>
            <tbody data-inquiries></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
