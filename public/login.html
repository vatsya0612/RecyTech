<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RecyTech</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="/"><img src="/assets/logo.svg" alt="RecyTech"></a>
      <nav class="nav-links">
        <a href="/marketplace.html">Marketplace</a>
        <a href="/sell.html">Sell E-Waste</a>
        <a href="/about.html">About</a>
      </nav>
      <div class="nav-actions" data-nav-actions></div>
    </div>
  </header>
  <main class="auth-shell">
    <section class="card auth-panel">
      <aside class="auth-aside">
        <h1>RecyTech</h1>
        <p>Use demo accounts or create your own seller, buyer, or recycler profile.</p>
        <p><strong>Admin</strong><br>admin@recytech.in / admin123</p>
        <p><strong>Seller</strong><br>seller@recytech.in / seller123</p>
        <p><strong>Buyer</strong><br>buyer@recytech.in / buyer123</p>
      </aside>
      <form class="card-body form-grid" data-auth-form>
        <input type="hidden" name="mode" value="login">
        <div class="full">
          <h2 data-auth-title>Welcome back</h2>
          <div data-auth-alert></div>
        </div>
        <div class="form-grid full" data-register-fields>
          <div class="form-field">
            <label>Name</label>
            <input class="input" name="name" placeholder="Aditya Watts">
          </div>
          <div class="form-field">
            <label>Phone</label>
            <input class="input" name="phone" placeholder="+91 98765 43210">
          </div>
          <div class="form-field">
            <label>City</label>
            <input class="input" name="city" placeholder="Jaipur">
          </div>
          <div class="form-field">
            <label>Role</label>
            <select class="select" name="role">
              <option value="seller">Seller</option>
              <option value="buyer">Buyer</option>
              <option value="recycler">Recycler</option>
            </select>
          </div>
        </div>
        <div class="form-field full">
          <label>Email</label>
          <input class="input" name="email" type="email" required placeholder="you@example.com">
        </div>
        <div class="form-field full">
          <label>Password</label>
          <input class="input" name="password" type="password" required placeholder="••••••••">
        </div>
        <div class="full form-row">
          <button class="btn green" data-auth-submit>Login</button>
          <button class="btn secondary" type="button" data-switch>New here? Create account</button>
        </div>
      </form>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
